name: Recapture SIA Fixtures

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  recapture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Capture refreshed fixtures
        env:
          SIA_USERNAME: ${{ secrets.SIA_USERNAME }}
          SIA_PASSWORD: ${{ secrets.SIA_PASSWORD }}
        run: python scripts/capture_sia_fixtures.py

      - name: Validate fixture integrity
        run: pytest tests/fixtures/test_fixtures_validity.py tests/fixtures/test_contracts.py tests/fixtures/test_regression.py

      - name: Push fixture updates to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="automation/monthly-fixture-refresh"

          if [ -z "$(git status --porcelain tests/fixtures)" ]; then
            echo "No fixture changes detected"
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            git checkout -B "$BRANCH_NAME"
            git add tests/fixtures
            git commit -m "test: refresh captured SIA fixtures"
            git push origin "$BRANCH_NAME" --force
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          fi

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Create or update notification issue
        if: env.HAS_CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = process.env.BRANCH_NAME;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const compareUrl = `${{ github.server_url }}/${{ github.repository }}/compare/main...${branchName}`;

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "automation,fixtures",
              per_page: 100,
            });

            const existingIssue = existingIssues.data.find(
              (issue) => issue.title === "Monthly fixture refresh ready for review"
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Fixture Refresh Updated\n\nA new fixture refresh has completed.\n\n- Branch: \`${branchName}\` (force-pushed)\n- Workflow run: ${runUrl}\n- Compare: ${compareUrl}`,
              });
              core.info(`Updated issue #${existingIssue.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Monthly fixture refresh ready for review",
                body: `## Automated Fixture Refresh\n\nThe monthly SIA fixture recapture workflow completed successfully.\n\n- Branch: \`${branchName}\`\n- Workflow run: ${runUrl}\n- Compare: ${compareUrl}\n\n### Next steps\n1. Review fixture changes from the compare link above.\n2. Open a pull request from \`${branchName}\` into \`main\`.\n3. Merge after CI passes.\n\nThis issue is closed automatically when the fixture refresh PR is merged.`,
                labels: ["testing", "fixtures", "automation"],
              });
              core.info("Created new fixture refresh issue");
            }

      - name: Skip notification when no changes
        if: env.HAS_CHANGES == 'false'
        run: echo "No fixture changes detected. Skipping issue creation."
