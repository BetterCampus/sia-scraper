name: Test Suite

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build and sync Rust extension
        run: python scripts/sync_rust_extension.py --build --release --verify

      - name: Install ruff linter
        # Explicitly install ruff to ensure it is available for lint checks.
        # It is also pinned in dev dependencies for reproducible local installs.
        run: pip install "ruff~=0.15.8"

      - name: Run Ruff lint checks
        run: ruff check .

      - name: Run type checks
        run: pyright

      - name: Run tests with coverage
        run: |
          pytest -m "not integration and not network" \
            --cov=src/sia_scraper \
            --cov-report=term \
            --cov-report=html \
            --cov-report=xml

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/

      - name: Upload coverage XML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
