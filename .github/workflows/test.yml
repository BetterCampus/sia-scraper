name: Test Suite

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
      PYTHONPATH: ${{ github.workspace }}/src

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "maturin>=1.0,<2.0"
          maturin --version
          # Build and install Rust extension
          maturin develop --release
          # Install Python dependencies (Python package found via PYTHONPATH)
          pip install lxml cssselect pydantic loguru
          pip install pytest pytest-asyncio pytest-mock pytest-cov pyright "ruff~=0.15.8" lxml-stubs pyyaml hypothesis
          python -c "import sia_scraper; import sia_scraper_rust; print('Both packages importable')"

      - name: Run Ruff lint checks
        run: ruff check .

      - name: Run type checks
        run: pyright

      - name: Run tests with coverage
        run: |
          pytest -m "not integration and not network" \
            --cov=src/sia_scraper \
            --cov-report=term \
            --cov-report=html \
            --cov-report=xml

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/

      - name: Upload coverage XML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
