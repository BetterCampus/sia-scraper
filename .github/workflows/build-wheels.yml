name: Build Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --no-default-features
          manylinux: auto

      - name: Smoke test built wheel
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import subprocess
          import sys

          wheels = glob.glob("dist/*.whl")
          if not wheels:
              raise SystemExit("No wheel found in dist/")

          wheel = wheels[0]
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheel, "--force-reinstall"])

          import sia_scraper_rust

          print(f"Wheel import OK: {sia_scraper_rust.__name__}")
          PY

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  sdist:
    name: Source Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
