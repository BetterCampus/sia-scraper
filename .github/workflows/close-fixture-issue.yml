name: Close Fixture Refresh Issue

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'automation/monthly-fixture-refresh'
    runs-on: ubuntu-latest

    steps:
      - name: Close fixture refresh issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "automation,fixtures",
              per_page: 100,
            });

            const fixtureIssue = issues.data.find(
              (issue) => issue.title === "Monthly fixture refresh ready for review"
            );

            if (!fixtureIssue) {
              core.info("No open fixture refresh issue found");
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: fixtureIssue.number,
              state: "closed",
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: fixtureIssue.number,
              body: `Completed by merge of #${context.payload.pull_request.number}.\n\nBranch cleanup was applied for \`automation/monthly-fixture-refresh\`.`,
            });

            core.info(`Closed issue #${fixtureIssue.number}`);

      - name: Delete automation branch
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = "automation/monthly-fixture-refresh";
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`,
              });
              core.info(`Deleted branch ${branchName}`);
            } catch (error) {
              if (error.status === 422 || error.status === 404) {
                core.info(`Branch ${branchName} was already absent`);
                return;
              }
              throw error;
            }
