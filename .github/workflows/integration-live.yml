name: Live SIA Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  integration-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build and sync Rust extension
        run: python scripts/sync_rust_extension.py --build --release --verify

      - name: Install ruff linter
        # Explicitly install ruff to ensure it is available for lint checks.
        # It is also pinned in dev dependencies for reproducible local installs.
        run: pip install "ruff~=0.15.8"

      - name: Run Ruff lint checks
        run: ruff check .

      - name: Run live integration tests
        run: pytest -m "integration and network" -v
